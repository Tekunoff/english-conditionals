<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mix</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f14; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 14px 16px 40px; }
    .top-bar { width: 100%; max-width: 480px; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 10px; margin-bottom: 12px; }
    .top-bar h1 { font-size: 15px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; }
    .btn-back { background: none; border: 1.5px solid #3d3d5c; color: #9d9dff; border-radius: 20px; padding: 8px 14px; font-size: 15px; cursor: pointer; text-decoration: none; line-height: 1; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
    .btn-rule { background: none; border: 1.5px solid #3d3d5c; color: #9d9dff; border-radius: 20px; padding: 8px 14px; font-size: 15px; cursor: pointer; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
    .progress-bar-wrap { width: 100%; max-width: 480px; background: #1e1e2a; border-radius: 6px; height: 6px; margin-bottom: 6px; }
    .progress-bar { height: 6px; background: #7b68ee; border-radius: 6px; transition: width 0.4s ease; }
    .progress-info { width: 100%; max-width: 480px; font-size: 14px; color: #555; margin-bottom: 14px; }
    .task-card { width: 100%; max-width: 480px; background: #1a1a2e; border: 1.5px solid #2e2e50; border-radius: 14px; padding: 18px 20px; margin-bottom: 14px; }
    .task-label { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
    .task-ru { font-size: 22px; color: #e0e0ff; line-height: 1.5; font-weight: 500; }
    .form-choices { width: 100%; max-width: 480px; display: flex; gap: 10px; margin-bottom: 16px; }
    .form-btn { flex: 1; padding: 18px 8px; font-size: 18px; font-weight: 700; border: 1.5px solid #3d3d5c; border-radius: 14px; background: #1a1a2e; color: #d0d0f0; cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
    .form-btn:active { transform: scale(0.97); }
    .form-btn.correct { border-color: #4caf82; background: #1a2e22; color: #4caf82; }
    .form-btn.wrong   { border-color: #e05c5c; background: #2e1a1a; color: #e05c5c; }
    .sentence-blank { width: 100%; max-width: 480px; background: #1a1a24; border: 2px solid #2e2e44; border-radius: 14px; padding: 14px 16px; font-size: 22px; line-height: 1.45; color: #e0e0ff; margin-bottom: 12px; }
    .blank { color: #9d9dff; font-weight: 700; letter-spacing: 1px; }
    .translate-choices { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .translate-btn { width: 100%; text-align: left; padding: 14px 16px; font-size: 16px; border: 1.5px solid #3d3d5c; border-radius: 14px; background: #1a1a2e; color: #d0d0f0; cursor: pointer; }
    .translate-btn.correct { border-color: #4caf82; background: #1a2e22; color: #4caf82; }
    .translate-btn.wrong { border-color: #e05c5c; background: #2e1a1a; color: #e05c5c; }
    .btn-row { display: flex; gap: 12px; width: 100%; max-width: 480px; }
    button { border: none; border-radius: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
    button:active { transform: scale(0.97); }
    .btn-row button { flex: 1; padding: 20px; font-size: 20px; }
    #btn-next { background: #7b68ee; color: #fff; }
    .feedback { margin-top: 14px; width: 100%; max-width: 480px; font-size: 17px; line-height: 1.6; min-height: 50px; }
    .feedback .correct-label { color: #4caf82; font-weight: 700; }
    .feedback .wrong-label   { color: #e05c5c; font-weight: 700; }
    .feedback .answer        { color: #9d9dff; margin-top: 4px; }
    .note-box { margin-top: 10px; background: #1e1e3a; border-left: 3px solid #7b68ee; padding: 10px 14px; border-radius: 6px; font-size: 14px; color: #c8c8ff; display: none; }
    .finish { display: none; flex-direction: column; align-items: center; text-align: center; gap: 16px; margin-top: 40px; }
    .finish.show { display: flex; }
    .finish h2 { font-size: 30px; color: #7b68ee; }
    .finish button { max-width: 260px; background: #7b68ee; color: #fff; font-size: 18px; padding: 18px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: #1a1a2e; border: 1.5px solid #3d3d5c; border-radius: 18px; padding: 24px 22px; max-width: 460px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal h2 { font-size: 18px; color: #9d9dff; margin-bottom: 16px; }
    .modal p { font-size: 14px; color: #aaa; line-height: 1.7; margin-bottom: 10px; }
    .modal .example { background: #12122a; border-left: 3px solid #7b68ee; padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; font-size: 14px; color: #d0d0f0; line-height: 1.6; }
    .modal-close { margin-top: 20px; width: 100%; background: #7b68ee; color: #fff; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="btn-back">‹ Назад</a>
  <h1>Mix</h1>
  <button class="btn-rule" onclick="showRule()">📖 Правило</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
<div class="progress-info" id="progress-info">загрузка…</div>

<div id="step1">
  <div class="task-card">
    <div class="task-label">Choose the correct verb form</div>
    <div class="task-ru" id="task-ru">…</div>
  </div>
  <div class="form-choices">
    <button class="form-btn" data-form="gerund" onclick="chooseForm('gerund')">doing</button>
    <button class="form-btn" data-form="infinitive" onclick="chooseForm('infinitive')">to do</button>
    <button class="form-btn" data-form="bare" onclick="chooseForm('bare')">do</button>
  </div>
</div>

<div id="step2" style="display:none">
  <div class="task-card">
    <div class="task-label">Correct answer</div>
    <div class="task-ru" id="task-en-2">…</div>
  </div>
  <div class="task-label" id="translation-title" style="display:none;max-width:480px;width:100%;margin-bottom:8px;">Выбери правильный перевод</div>
  <div class="translate-choices" id="translate-choices" style="display:none;"></div>
  <div class="feedback" id="feedback"><div class="note-box" id="note-box"></div></div>
  <div class="btn-row">
    <button id="btn-next" onclick="nextQuestion()" style="display:none;">Далее →</button>
  </div>
</div>

<div class="finish" id="finish">
  <h2>🎉 Готово!</h2>
  <p id="final-score"></p>
  <button onclick="restart()">Продолжить</button>
  <button onclick="resetProgress()" style="background:#1e1e2a;color:#777;border:1.5px solid #2e2e44;margin-top:4px;">Сначала</button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Mix — Правило</h2>
    <p>Здесь перемешаны все 4 группы: <strong style="color:#c8c8ff">gerund</strong>, <strong style="color:#c8c8ff">infinitive</strong>, <strong style="color:#c8c8ff">bare infinitive</strong> и <strong style="color:#c8c8ff">both forms</strong>.</p>
    <div class="example">Сначала выбери форму глагола, затем собери предложение из чипов.</div>
    <button class="modal-close" onclick="hideRule()">Понятно ✓</button>
  </div>
</div>

<script src="sentences-data.js"></script>
<script>
const STORAGE_KEY = 'verbFormsMix';
const ALL_KEYS = ['gerundOnly', 'infinitiveOnly', 'bareInfinitive', 'bothForms'];
const allSentences = ALL_KEYS.flatMap((key) =>
  (window.sentencesData[key] || []).map((item, idx) => ({ ...item, _id: `${key}:${idx}` }))
);

let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let queue = [];
let current = null;
let formChosen = false;
let translationCorrect = '';

const FORM_LABEL = {
  gerund: 'doing',
  infinitive: 'to do',
  bare: 'do',
};

function buildQueue() {
  const all = allSentences.map((item) => item._id);
  const notDone = all.filter((id) => !done.includes(id));
  queue = (notDone.length ? notDone : all).sort(() => Math.random() - 0.5);
}

function updateProgressBar() {
  const total = allSentences.length;
  const pct = total ? Math.round((done.length / total) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-info').textContent = `${done.length} / ${total} изучено`;
}

function loadQuestion() {
  if (!queue.length) buildQueue();
  const id = queue.shift();
  current = allSentences.find((item) => item._id === id);
  window.__currentQuestion = current;
  formChosen = false;

  document.getElementById('step1').style.display = '';
  document.getElementById('step2').style.display = 'none';
  document.querySelectorAll('.form-btn').forEach((btn) => {
    btn.classList.remove('correct', 'wrong');
    btn.disabled = false;
  });
  translationCorrect = current.ru;
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('translate-choices').style.display = 'none';
  document.getElementById('translation-title').style.display = 'none';
  document.getElementById('feedback').innerHTML = '<div class="note-box" id="note-box"></div>';
  document.getElementById('task-ru').innerHTML = buildSentenceTemplate(current);
}

function buildSentenceTemplate(item) {
  const words = [...(item.words || [])];
  const key = (item.keyVerb || '').trim().split(' ').filter(Boolean);
  if (!key.length) return words.join(' ');
  const lowerWords = words.map((w) => w.toLowerCase());
  const lowerKey = key.map((w) => w.toLowerCase());
  let start = -1;
  for (let i = 0; i <= lowerWords.length - lowerKey.length; i++) {
    let ok = true;
    for (let j = 0; j < lowerKey.length; j++) {
      if (lowerWords[i + j] !== lowerKey[j]) {
        ok = false;
        break;
      }
    }
    if (ok) {
      start = i;
      break;
    }
  }
  if (start === -1) return words.join(' ');
  words.splice(start, lowerKey.length, '____');
  return words.join(' ').replace('____', '<span class="blank">____</span>');
}

function isBothFormsQuestion() {
  return current && typeof current._id === 'string' && current._id.startsWith('bothForms:');
}

function chooseForm(form) {
  if (formChosen) return;
  const btns = document.querySelectorAll('.form-btn');
  btns.forEach((btn) => (btn.disabled = true));

  if (form === current.verbForm) {
    formChosen = true;
    btns.forEach((btn) => {
      if (btn.dataset.form === form) btn.classList.add('correct');
    });
    setTimeout(goToStep2, 400);
  } else {
    btns.forEach((btn) => {
      if (btn.dataset.form === form) btn.classList.add('wrong');
      if (btn.dataset.form === current.verbForm) {
        btn.classList.add('correct');
        btn.disabled = false;
      }
    });
  }
}

function goToStep2() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = '';
  document.getElementById('task-en-2').innerHTML = buildSentenceTemplate(current);
  if (isBothFormsQuestion()) {
    renderTranslationOptions();
    return;
  }
  markSuccess();
}

function renderTranslationOptions() {
  const choices = document.getElementById('translate-choices');
  const title = document.getElementById('translation-title');
  title.style.display = '';
  choices.style.display = '';
  const alternatives = allSentences.filter((item) => item._id !== current._id && item._id.startsWith('bothForms:'));
  const wrongItem = alternatives[Math.floor(Math.random() * alternatives.length)] || current;
  const options = shuffle([current.ru, wrongItem.ru]);
  choices.innerHTML = '';
  options.forEach((ru) => {
    const btn = document.createElement('button');
    btn.className = 'translate-btn';
    btn.textContent = ru;
    btn.onclick = () => chooseTranslation(ru, btn);
    choices.appendChild(btn);
  });
}

function chooseTranslation(ru, btn) {
  const allBtns = [...document.querySelectorAll('.translate-btn')];
  allBtns.forEach((x) => (x.disabled = true));
  const fb = document.getElementById('feedback');
  if (ru === translationCorrect) {
    btn.classList.add('correct');
    markSuccess();
  } else {
    btn.classList.add('wrong');
    const correctBtn = allBtns.find((x) => x.textContent === translationCorrect);
    if (correctBtn) {
      correctBtn.classList.add('correct');
      correctBtn.disabled = false;
    }
    fb.innerHTML = '<span class="wrong-label">✗ Неверно.</span><div class="answer">' + translationCorrect + '</div>';
  }
}

function markSuccess() {
  const fb = document.getElementById('feedback');
  fb.innerHTML = '<span class="correct-label">✓ Правильно: ' + FORM_LABEL[current.verbForm] + '</span>';
  if (current.note) {
    const nb = document.createElement('div');
    nb.className = 'note-box';
    nb.style.display = 'block';
    nb.textContent = '💡 ' + current.note;
    fb.appendChild(nb);
  }
  if (!done.includes(current._id)) {
    done.push(current._id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
  }
  updateProgressBar();
  document.getElementById('btn-next').style.display = '';
  if (done.length === allSentences.length) setTimeout(showFinish, 500);
}

function nextQuestion() {
  loadQuestion();
}

function showFinish() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('finish').classList.add('show');
  document.getElementById('final-score').textContent = `Все ${allSentences.length} предложений пройдено!`;
}

function restart() {
  document.getElementById('finish').classList.remove('show');
  buildQueue();
  loadQuestion();
}

function resetProgress() {
  done = [];
  localStorage.removeItem(STORAGE_KEY);
  updateProgressBar();
  restart();
}

function showRule() { document.getElementById('modal').classList.add('show'); }
function hideRule() { document.getElementById('modal').classList.remove('show'); }

buildQueue();
loadQuestion();
updateProgressBar();
</script>

</body>
</html>
